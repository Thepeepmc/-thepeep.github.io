<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Website</title>

    <style>
        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #0f172a;
            color: #e2e8f0;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        header {
            background: #1e293b;
            padding: 20px;
            font-size: 24px;
            font-weight: bold;
            animation: fadeIn 1s ease-in;
        }

        .container {
            padding: 30px;
            animation: fadeIn 1.2s ease-in;
        }

        img {
            width: 300px;
            border-radius: 15px;
            margin: 20px 0;
            transition: transform 0.4s ease;
        }

        img:hover {
            transform: scale(1.05);
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 60%;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #334155;
            margin: 10px 0;
            padding: 10px;
            border-radius: 8px;
            transition: transform 0.2s ease;
        }

        li:hover {
            transform: scale(1.03);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>

</head>
<body>

<header>
    Arsin Hassan
</header>

<div class="container">

    <div class="card">
        <h2>Photo</h2>
        <img src="./Sea Turtles.jfif" alt="turtle">
    </div>

    <div class="card">
        <h2>About Me</h2>
        <p>I like coding and playing minecraft</p>
    </div>

    <div class="card">
        <h2>Hobbies</h2>
        <ul>
            <li>Coding</li>
            <li>Riding bikes</li>
            <li>Playing minecraft</li>
            <li>Watching television</li>
        </ul>
    </div>

</div>

</body>
</html>
